openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stories
    description: Story generation operations
  - name: account
    description: Account privacy and deletion operations
  - name: assets
    description: Private generated asset operations
  - name: sharing
    description: Expiring share-link operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stories/generate:
    post:
      operationId: generateStory
      tags: [stories]
      summary: Generate a child picture book
      description: Starts a high-quality story-sheet generation job for a child character.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryRequest"
      responses:
        "202":
          description: Story generation job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryGenerationJob"
        "400":
          description: Story generation request was rejected before generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardrailBlockedMessage"
        "403":
          description: External text AI consent is required before generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRequiredMessage"
        "503":
          description: Story generation is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /stories/{bookId}/status:
    get:
      operationId: getStoryStatus
      tags: [stories]
      summary: Get story generation status
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Story generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryGenerationStatus"
        "404":
          description: Story job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /stories/{bookId}:
    get:
      operationId: getGeneratedStory
      tags: [stories]
      summary: Get completed generated story
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated picture book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedStory"
        "404":
          description: Story job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Story generation is not complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryGenerationStatus"
  /account/deletion-request:
    post:
      operationId: requestAccountDeletion
      tags: [account]
      summary: Request account deletion
      description: Queues deletion of user-linked records after fresh parent re-authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountDeletionRequest"
      responses:
        "202":
          description: Account deletion request queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDeletionAccepted"
        "400":
          description: Re-authentication timestamp is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCodeMessage"
        "401":
          description: Sign-in is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCodeMessage"
        "403":
          description: Fresh re-authentication is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCodeMessage"
  /assets/{assetId}:
    get:
      operationId: getPrivateAsset
      tags: [assets]
      summary: Read a private generated asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Private asset bytes
        "401":
          description: Sign-in is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Asset not found or not owned by the requester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /share-links:
    post:
      operationId: createShareLink
      tags: [sharing]
      summary: Create a 24-hour share link for a private asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkRequest"
      responses:
        "201":
          description: Share link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateShareLinkResponse"
        "401":
          description: Sign-in is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Asset not found or not owned by the requester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /share-links/{token}:
    get:
      operationId: getShareLink
      tags: [sharing]
      summary: Open a redacted share link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Redacted shared asset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkView"
        "404":
          description: Share link not found, expired, revoked, or deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /share-links/{token}/revoke:
    post:
      operationId: revokeShareLink
      tags: [sharing]
      summary: Revoke a share link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Share link revoked
        "401":
          description: Sign-in is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Share link not found or not owned by requester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
components:
  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ErrorCodeMessage:
      allOf:
        - $ref: "#/components/schemas/ErrorMessage"
        - type: object
          properties:
            code:
              type: string
          required:
            - code
    AccountDeletionRequest:
      type: object
      properties:
        reauthenticatedAt:
          type: string
          format: date-time
          description: Timestamp from the parent re-authentication challenge.
      required:
        - reauthenticatedAt
    AccountDeletionAccepted:
      type: object
      properties:
        deletionRequestId:
          type: string
        status:
          type: string
          enum:
            - queued
        requestedAt:
          type: string
          format: date-time
      required:
        - deletionRequestId
        - status
        - requestedAt
    CreateShareLinkRequest:
      type: object
      properties:
        assetId:
          type: string
        title:
          type: string
          description: Optional title to redact before public sharing.
      required:
        - assetId
    CreateShareLinkResponse:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
      required:
        - token
        - expiresAt
    ShareLinkView:
      type: object
      properties:
        title:
          type: string
          description: Redacted title safe for unauthenticated sharing.
        assetKind:
          type: string
        assetId:
          type: string
      required:
        - title
        - assetKind
        - assetId
    GuardrailBlockedMessage:
      allOf:
        - $ref: "#/components/schemas/ErrorMessage"
        - type: object
          properties:
            code:
              type: string
              enum:
                - input_guardrail_blocked
            category:
              type: string
              enum:
                - prompt_injection
                - high_risk_safety
          required:
            - code
            - category
    ConsentRequiredMessage:
      allOf:
        - $ref: "#/components/schemas/ErrorMessage"
        - type: object
          properties:
            code:
              type: string
              enum:
                - external_text_ai_consent_required
          required:
            - code
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CharacterInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        photoUri:
          type: string
          deprecated: true
          description: Local preview URI only. Production generation ignores this field and never sends family photos to AI providers.
        appearance:
          type: string
          description: Optional non-photo appearance descriptor for illustration consistency.
      required:
        - name
    StoryMode:
      type: string
      enum:
        - behavior
        - random
    SupportingCharacter:
      type: object
      properties:
        name:
          type: string
        relationship:
          type: string
        photoUri:
          type: string
          deprecated: true
          description: Local preview URI only. Production generation ignores this field and never sends family photos to AI providers.
        appearance:
          type: string
          description: Optional non-photo appearance descriptor for illustration consistency.
      required:
        - name
        - relationship
    GenerateStoryRequest:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/StoryMode"
        prompt:
          type: string
          description: Parent-provided behavior focus or story idea.
        character:
          $ref: "#/components/schemas/CharacterInput"
        supportingCharacters:
          type: array
          items:
            $ref: "#/components/schemas/SupportingCharacter"
          description: Optional list of other characters to include if the story calls for them.
        externalTextAiConsent:
          type: boolean
          description: Explicit parent consent for sending prompt and behavior details to an external text AI provider.
      required:
        - mode
        - character
    StoryPage:
      type: object
      properties:
        pageNumber:
          type: integer
          minimum: 1
        text:
          type: string
          description: 1-3 sentences of simple, age-appropriate story text.
        illustrationPrompt:
          type: string
          description: A short description of what the watercolor illustration on this page should show.
        imageUrl:
          type: string
          description: URL of the sliced storyboard image for this page.
        scene:
          type: string
        composition:
          type: string
        emotion:
          type: string
      required:
        - pageNumber
        - text
        - illustrationPrompt
    StoryGenerationStep:
      type: string
      enum:
        - queued
        - writing_story
        - painting_sheet
        - slicing_pages
        - preparing_reader
        - complete
        - failed
    StoryGenerationStatusValue:
      type: string
      enum:
        - queued
        - running
        - complete
        - failed
    StoryGenerationJob:
      type: object
      properties:
        bookId:
          type: string
        status:
          $ref: "#/components/schemas/StoryGenerationStatusValue"
        step:
          $ref: "#/components/schemas/StoryGenerationStep"
        message:
          type: string
        activeIssue:
          type: string
        issueNotice:
          type: string
      required:
        - bookId
        - status
        - step
        - message
    StoryGenerationStatus:
      allOf:
        - $ref: "#/components/schemas/StoryGenerationJob"
        - type: object
          properties:
            error:
              type: string
    StoryArtifactLinks:
      type: object
      properties:
        bookHtmlUrl:
          type: string
        storyJsonUrl:
          type: string
        usageJsonUrl:
          type: string
    GeneratedStory:
      type: object
      properties:
        title:
          type: string
        pages:
          type: array
          items:
            $ref: "#/components/schemas/StoryPage"
          minItems: 10
          maxItems: 20
        reflectionQuestion:
          type: string
        coverImageUrl:
          type: string
          description: URL of the AI-generated watercolor cover illustration.
        endImageUrl:
          type: string
          description: URL of the sliced end-page illustration.
        sheetImageUrl:
          type: string
          description: URL of the full 4x4 storyboard sheet.
        artifactLinks:
          $ref: "#/components/schemas/StoryArtifactLinks"
      required:
        - title
        - pages
        - reflectionQuestion

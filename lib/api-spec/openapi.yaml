openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stories
    description: Story generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stories/generate:
    post:
      operationId: generateStory
      tags: [stories]
      summary: Generate a child picture book
      description: Generates a watercolor kids picture book (10-20 pages) for a child character.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryRequest"
      responses:
        "200":
          description: Generated picture book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedStory"
  /books:
    post:
      operationId: createBook
      tags: [stories]
      summary: Run the book generation pipeline
      description: Creates a persistent book job, runs the deterministic pipeline, and returns the packaged result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryRequest"
      responses:
        "201":
          description: Completed or QA-flagged book pipeline result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookPipelineResult"
  /books/qa:
    get:
      operationId: listQaBooks
      tags: [stories]
      summary: List books flagged for human QA
      responses:
        "200":
          description: QA queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaBookList"
  /books/{bookId}:
    get:
      operationId: getBook
      tags: [stories]
      summary: Get book pipeline status
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Book status and packaged story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookStatus"
  /books/{bookId}/pages:
    get:
      operationId: getBookPages
      tags: [stories]
      summary: Get per-page pipeline state
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Book page states
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookPageList"
  /books/{bookId}/events:
    get:
      operationId: getBookEvents
      tags: [stories]
      summary: Get structured book events
      parameters:
        - $ref: "#/components/parameters/BookId"
      responses:
        "200":
          description: Book event log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookEventList"
components:
  parameters:
    BookId:
      name: bookId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CharacterInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        photoUri:
          type: string
        appearance:
          type: string
          description: Optional short appearance description for illustration consistency.
      required:
        - name
    StoryMode:
      type: string
      enum:
        - behavior
        - random
    SupportingCharacter:
      type: object
      properties:
        name:
          type: string
        relationship:
          type: string
      required:
        - name
        - relationship
    GenerateStoryRequest:
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/StoryMode"
        prompt:
          type: string
          description: Parent-provided behavior focus or story idea.
        character:
          $ref: "#/components/schemas/CharacterInput"
        supportingCharacters:
          type: array
          items:
            $ref: "#/components/schemas/SupportingCharacter"
          description: Optional list of other characters to include if the story calls for them.
      required:
        - mode
        - character
    StoryPage:
      type: object
      properties:
        pageNumber:
          type: integer
          minimum: 1
        text:
          type: string
          description: 1-3 sentences of simple, age-appropriate story text.
        illustrationPrompt:
          type: string
          description: A short description of what the watercolor illustration on this page should show.
        imageUrl:
          type: string
          description: Optional page image URL produced from slicing the generated sheet image.
      required:
        - pageNumber
        - text
        - illustrationPrompt
    GeneratedStory:
      type: object
      properties:
        title:
          type: string
        pages:
          type: array
          items:
            $ref: "#/components/schemas/StoryPage"
          minItems: 10
          maxItems: 20
        reflectionQuestion:
          type: string
        coverImageUrl:
          type: string
          description: URL of the AI-generated watercolor cover illustration.
        sheetImageUrl:
          type: string
          description: URL of the composite watercolor sheet image that can be sliced into the 12 page images.
      required:
        - title
        - pages
        - reflectionQuestion
    BookPipelineResult:
      type: object
      properties:
        bookId:
          type: string
          format: uuid
        status:
          type: string
        story:
          $ref: "#/components/schemas/GeneratedStory"
        flaggedForHuman:
          type: boolean
        retryTotal:
          type: integer
      required:
        - bookId
        - status
        - story
        - flaggedForHuman
        - retryTotal
    BookStatus:
      type: object
      properties:
        bookId:
          type: string
          format: uuid
        status:
          type: string
        currentStep:
          type: string
        title:
          type: string
        pageCount:
          type: integer
        flaggedForHuman:
          type: boolean
        retryTotal:
          type: integer
        story:
          $ref: "#/components/schemas/GeneratedStory"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - bookId
        - status
        - currentStep
        - pageCount
        - flaggedForHuman
        - retryTotal
        - createdAt
        - updatedAt
    BookPageStatus:
      type: object
      properties:
        pageId:
          type: string
          format: uuid
        bookId:
          type: string
          format: uuid
        pageNumber:
          type: integer
        currentStep:
          type: string
        status:
          type: string
        text:
          type: string
        illustrationPrompt:
          type: string
        alignmentScore:
          type: number
        retryCount:
          type: integer
        flagForHuman:
          type: boolean
        failureReason:
          type: string
      required:
        - pageId
        - bookId
        - pageNumber
        - currentStep
        - status
        - retryCount
        - flagForHuman
    BookPageList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BookPageStatus"
      required:
        - items
    BookEvent:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        bookId:
          type: string
          format: uuid
        pageId:
          type: string
          format: uuid
        agent:
          type: string
        eventType:
          type: string
        payloadJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - eventId
        - bookId
        - agent
        - eventType
        - payloadJson
        - createdAt
    BookEventList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BookEvent"
      required:
        - items
    QaBook:
      type: object
      properties:
        bookId:
          type: string
          format: uuid
        status:
          type: string
        currentStep:
          type: string
        title:
          type: string
        flaggedForHuman:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required:
        - bookId
        - status
        - currentStep
        - flaggedForHuman
        - updatedAt
    QaBookList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QaBook"
      required:
        - items

services:
  - type: web
    name: kahani-api-staging
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kahani-postgres-staging
          property: connectionString
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AI_INTEGRATIONS_OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: AI_INTEGRATIONS_OPENROUTER_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENROUTER_MODEL
        sync: false
      - key: AI_INTEGRATIONS_OPENROUTER_IMAGE_MODEL
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_APP_TITLE
        value: Kahani

databases:
  - name: kahani-postgres-staging
    plan: starter
    databaseName: kahani
    user: kahani
